<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RCS 在庫管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1>📦 RCS 在庫管理</h1>
            <button class="btn-primary-small" onclick="saveAllStock()">💾 一括保存</button>
        </div>
        
        <div class="tab-container">
            <button class="tab-btn active" id="tab-update-btn" onclick="switchTab('update')">📝 在庫更新</button>
            <button class="tab-btn" id="tab-history-btn" onclick="switchTab('history')">📜 変更履歴</button>
        </div>

        <datalist id="category-suggestions">
            <option value="豆">
            <option value="カップ">
            <option value="消耗品">
            <option value="シロップ">
            <option value="備品">
        </datalist>

        <div id="tab-update">
            <div class="search-group">
                <select class="search-bar" id="category-filter" style="width: 40%;" onchange="renderInventory()">
                    <option value="すべて">全分類</option>
                </select>
                <input type="text" class="search-bar" id="search-input" style="width: 60%;" placeholder="🔍 検索 (ひらがなOK)" oninput="renderInventory()">
            </div>
            
            <div class="add-panel hidden" id="add-panel">
                <div style="display:flex; gap:8px; margin-bottom:8px;">
                    <input type="text" id="add_category" placeholder="分類 (例: 豆, カップ)" list="category-suggestions" style="flex:1;">
                    <input type="text" id="add_name" placeholder="商品名" style="flex:2;">
                </div>
                <div style="display:flex; gap:8px; margin-bottom:8px;">
                    <input type="number" id="add_min" placeholder="目標値 (例: 10)" step="0.5">
                    <input type="text" id="add_unit" placeholder="単位 (例: 個, 袋)" value="個">
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-success" style="padding:10px; width:100%; border-radius:8px; font-weight:bold;" onclick="addNewItem()">➕ 登録</button>
                    <button class="btn-secondary" onclick="toggleAddPanel()">取消</button>
                </div>
            </div>
            <button class="btn-secondary" id="show-add-btn" style="width:100%; margin-bottom:16px; background:#1e293b; border:1px dashed #475569;" onclick="toggleAddPanel()">➕ 新規アイテムを登録</button>

            <div id="inventory-list">読み込み中...</div>
        </div>

        <div id="tab-history" class="hidden">
            <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                <button class="btn-secondary" style="flex: 1;" onclick="exportCSV('current')">📦 現在の在庫DL</button>
                <button class="btn-secondary" style="flex: 1;" onclick="exportCSV('history')">📥 履歴データDL</button>
            </div>
            <div id="history-list">読み込み中...</div>
        </div>
    </div>

    <div id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
